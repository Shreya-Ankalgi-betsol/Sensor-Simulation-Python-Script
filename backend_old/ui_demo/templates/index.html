<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sensor Map + Trajectory</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; }
    #map { height: calc(100vh - 110px); width: 100%; }
    .toolbar { padding: 10px 14px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; gap: 16px; align-items: center; }
    .pill { padding: 6px 10px; border-radius: 18px; background: #eef2ff; color: #1f3b8f; font-size: 13px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="pill">UI: Sensor locations + coverage + trajectories</div>
    <div class="pill" id="status">Loading...</div>
  </div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map').setView([23.03, 72.58], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const layers = {
      sensors: L.layerGroup().addTo(map),
      coverage: L.layerGroup().addTo(map),
      tracks: L.layerGroup().addTo(map)
    };

    const palette = ['#ef4444', '#2563eb', '#16a34a', '#a855f7', '#f59e0b', '#0891b2', '#be123c', '#0f766e'];

    function getColor(index) {
      return palette[index % palette.length];
    }

    function drawCoverage(sensor, color) {
      const radius = sensor.coverage_range_m || 50;
      L.circle([sensor.latitude, sensor.longitude], {
        radius,
        color,
        opacity: 0.6,
        fillOpacity: 0.08
      }).addTo(layers.coverage);
    }

    function drawSensor(sensor, color) {
      const marker = L.circleMarker([sensor.latitude, sensor.longitude], {
        radius: 7,
        color,
        fillColor: color,
        fillOpacity: 0.9
      }).addTo(layers.sensors);

      marker.bindPopup(
        `<b>${sensor.sensor_id}</b><br>` +
        `Type: ${sensor.sensor_type}<br>` +
        `Lat/Lon: ${sensor.latitude.toFixed(5)}, ${sensor.longitude.toFixed(5)}<br>` +
        `Coverage: ${sensor.coverage_angle_deg}° / ${sensor.coverage_range_m}m`
      );
    }

    function drawTrajectory(sensorId, points, color) {
      if (!points || points.length < 2) return;
      const latLngs = points.map(p => [p.latitude, p.longitude]);
      L.polyline(latLngs, {
        color,
        weight: 3,
        opacity: 0.85
      }).addTo(layers.tracks);

      const last = points[points.length - 1];
      L.circleMarker([last.latitude, last.longitude], {
        radius: 5,
        color,
        fillColor: color,
        fillOpacity: 1
      }).addTo(layers.tracks).bindTooltip(`${sensorId} latest object point`);
    }

    async function refresh() {
      const status = document.getElementById('status');
      try {
        const response = await fetch('/api/map-data');
        const data = await response.json();

        layers.sensors.clearLayers();
        layers.coverage.clearLayers();
        layers.tracks.clearLayers();

        data.sensors.forEach((sensor, idx) => {
          const color = getColor(idx);
          drawSensor(sensor, color);
          drawCoverage(sensor, color);
          drawTrajectory(sensor.sensor_id, data.trajectories[sensor.sensor_id], color);
        });

        status.textContent = `Sensors: ${data.sensors.length} | DB: ${data.db_path}`;
      } catch (error) {
        status.textContent = 'Failed to load map data';
      }
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
